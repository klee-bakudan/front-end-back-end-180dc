<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h2>➕ Tambah Produk Baru</h2>
                <button onclick="window.location.href='products.html'" class="btn btn-secondary">Kembali</button>
            </div>

            <form id="newProductForm">
                <div class="form-group">
                    <label for="name">Nama Produk</label>
                    <input type="text" id="name" name="name" required placeholder="Contoh: Keripik Pisang">
                    <div id="nameError" class="inline-error"></div>
                </div>

                <div class="form-group">
                    <label for="price">Harga (Rp)</label>
                    <input type="number" id="price" name="price" required min="1" placeholder="Contoh: 15000">
                    <div id="priceError" class="inline-error"></div>
                </div>

                <div class="modal-buttons">
                    <button type="button" onclick="window.location.href='products.html'" class="btn btn-secondary">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
